services:
  - type: web
    name: beaconai-app
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: TOKEN_ENCRYPTION_SECRET
        generateValue: true
      - key: API_BASE_URL
        value: https://beaconai-app.onrender.com/api
      - key: WEB_BASE_URL
        value: https://beaconai-app.onrender.com
      - key: SHOPIFY_CLIENT_ID
        sync: false
      - key: SHOPIFY_CLIENT_SECRET
        sync: false
      - key: SHOPIFY_SCOPES
        value: read_products,read_customers,read_orders
      - key: KLAVIYO_CLIENT_ID
        sync: false
      - key: KLAVIYO_CLIENT_SECRET
        sync: false
      - key: KLAVIYO_SCOPES
        value: accounts:read campaigns:read campaigns:write catalogs:read flows:read lists:read lists:write profiles:read profiles:write segments:read templates:read templates:write
      - key: KLAVIYO_REVISION
        value: 2026-04-15
