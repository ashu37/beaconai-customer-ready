services:
  - type: web
    name: beaconai-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    autoDeploy: false
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: beaconai-postgres
          property: connectionString
      - key: PORT
        value: 4000
      - key: API_BASE_URL
        sync: false
      - key: WEB_BASE_URL
        sync: false
      - key: TOKEN_ENCRYPTION_SECRET
        generateValue: true
      - key: SHOPIFY_CLIENT_ID
        sync: false
      - key: SHOPIFY_CLIENT_SECRET
        sync: false
      - key: SHOPIFY_SCOPES
        value: read_products,read_customers,read_orders
      - key: KLAVIYO_CLIENT_ID
        sync: false
      - key: KLAVIYO_CLIENT_SECRET
        sync: false
      - key: KLAVIYO_SCOPES
        value: accounts:read campaigns:read campaigns:write catalogs:read flows:read profiles:read segments:read templates:read templates:write
      - key: KLAVIYO_REVISION
        value: 2026-04-15

databases:
  - name: beaconai-postgres
    plan: starter
    databaseName: beaconai
    user: beaconai
