services:
  postgres:
    image: postgres:16
    container_name: beaconai-postgres
    environment:
      POSTGRES_DB: beaconai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - beaconai_pgdata:/var/lib/postgresql/data

volumes:
  beaconai_pgdata:
