# BeaconAI per-vertical / per-stage priors registry — Milestone 2 (T2.4).
#
# This file extracts the per-vertical constants currently inlined in
# `src/action_engine.py` (e.g., `bestseller_amplify` base rate of 0.18 for
# beauty, `retention_mastery` churn_reduction of 0.075 for mixed) into a
# single, dated, source-classed config artifact.
#
# *** CRITICAL: M2 IS CONFIG-ONLY. ***
# This YAML is NOT loaded at runtime in M2. The M0 golden tests and the
# legacy CSV -> HTML workflow continue to read inline constants from
# `action_engine.py`. M6 will introduce `src/priors_loader.py` and switch
# the engine to read from this file. M10 will delete the inline constants.
# Until then, this file is for schema validation, traceability, and review.
#
# Schema per prior entry:
#   name:           short prior identifier; matches keys in
#                   `PlayDef.prior_keys` in `src/play_registry.py`.
#   value:          point estimate (the legacy inline constant).
#   range_p10:      conservative low bound (subjective P10 estimate).
#   range_p90:      conservative high bound (subjective P90 estimate).
#   source_class:   one of {observational, causal, expert}.
#                     - observational: derived from this engine's CSV-only
#                       observational analyses (no randomized counterfactual).
#                     - causal: derived from a randomized or quasi-experimental
#                       study (none today; reserved for the future).
#                     - expert: SME judgement / industry benchmark / heuristic.
#                       This is the conservative fallback when uncertain.
#   last_updated:   ISO date the value was set or last reviewed.
#   applies_to:     scope object: { vertical, subvertical?, business_stage? }.
#                   Empty / "*" means "all".
#
# Source-class assignment rule (from M2 instructions):
# When in doubt about source_class for a vertical, prefer the more
# conservative class. Today, every value here is a hand-picked constant
# that was tuned by the engine maintainers from internal experience and
# small CSV experiments without a randomized control. We therefore label
# every entry "expert" by default, and explicitly note where a value has
# at least some observational support.
#
# Conservative ordering: expert > observational > causal (more conservative
# = less specific / less rigorous evidence). When uncertain, use expert.

