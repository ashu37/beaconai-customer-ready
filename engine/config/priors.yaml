# ---------------------------------------------------------------------------
# Sprint 4 Ticket G-3 — Supplements priors expansion + ``mixed`` semantics
# (2026-05-10).
#
# This file's vertical scope is hard-locked at {beauty, supplements, mixed}
# per founder decision D-8. Apparel, food/bev, home, wellness are refused
# at the priors loader (``ConfigError``); they NEVER appear here. Top-level
# vertical_mode-position keys outside the supported set raise at load time.
#
# ``mixed`` semantics, formalised by G-3:
#
#   - When an explicit ``applies_to.vertical: mixed`` entry is authored,
#     it is the value used for ``vertical_mode=mixed`` lookups.
#   - When NO explicit mixed entry exists for a (play, prior) pair, the
#     priors loader (``src/priors_loader.py::resolve_mixed_prior``) blends
#     the beauty + supplements entries 50/50 deterministically. It will
#     NEVER silently default to beauty alone — if either side is missing,
#     the resolver returns None and the caller suppresses the revenue
#     range. Tests in ``tests/test_g3_supplements_priors.py`` pin this.
#   - A wildcard ``vertical: "*"`` entry is the author's explicit
#     "applies to every vertical" statement; it short-circuits the blend.
#
# Every supplements entry MUST carry a ``source`` field naming the basis
# (industry report, internal observational analysis on this engine's
# CSVs, or ``internal_heuristic_unvalidated`` for engineering-intuition
# values that have no external citation). Source classes are the M2 set
# {observational, causal, expert}; no entry may be ``causal`` without an
# explicit external citation. G-3 introduces no causal priors.
# ---------------------------------------------------------------------------

