# BeaconAI sub-vertical token dictionary (Sprint 6.5 Ticket T2).
#
# Token-dictionary for the revenue-weighted sub-vertical classifier
# (src/profile/builder.py::detect_subvertical). Tokens are matched
# case-insensitively against product titles from the orders DataFrame
# (the "product" / "lineitem_any" / "Lineitem name" column).
#
# Founder Q1 (2026-05-17): Sephora + iHerb scraped vocabulary is the
# source-of-truth. Every cell is tagged ``validation_status:
# heuristic_unvalidated`` mirroring the priors-validation discipline
# established at Sprint 7.5. Cell-by-cell validation lands post-beta.
#
# Source URLs (per founder Q1):
sources:
  - url: https://www.sephora.com/shop/skincare
    accessed: 2026-05-17
    vertical: beauty
