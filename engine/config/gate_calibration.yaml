# ---------------------------------------------------------------------
# primary_window: per (vertical, subvertical). FALLBACK ONLY — R2 makes
# cadence-derived the primary path. Consulted when:
#   - business_model == SUBSCRIPTION_LED (subscription cadence is
#     contractual, not behavioral; DS architect risk #4)
#   - cadence.detection_status == INSUFFICIENT_DATA
#   - cadence has no entry for the relevant SKU class
# Sketch numbers per architecture proposal — beauty/skincare→L28;
# beauty/cosmetics→L28; beauty/haircare→L56; supplements/protein→L60;
# supplements/multivitamin→L60; supplements/nootropics→L90. We pin
# these to {L28, L56, L90} for L42 deferral (supplements/protein
# rounds 60 → L56).
# ---------------------------------------------------------------------

primary_window:
  beauty:
    skincare: L28
    cosmetics: L28
    haircare: L56
    personal_care: L28
    mixed: L28
  supplements:
    protein: L56
    multivitamin: L56
    probiotics: L56
    nootropics: L90
    functional: L56
    mixed: L56

# ---------------------------------------------------------------------
