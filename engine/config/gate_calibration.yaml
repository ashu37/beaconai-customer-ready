# BeaconAI gate calibration (Sprint 6.5 Ticket T4).
#
# The load-bearing artifact for profile-driven gate cells. Consumed by
# ``src/profile/builder.py::derive_gate_calibration`` and propagated to
# the four consumers (audience_builders, measurement_builder, decide,
# sizing) when ``ENGINE_V2_STORE_PROFILE`` is ON.
#
# Founder Q4 (2026-05-17): every cell is tagged
# ``validation_status: heuristic_unvalidated``. Cell-by-cell validation
# is deferred to outcome-driven recalibration (S10+, Phase 9 outcome
# importer). Heuristic cells start CONSERVATIVE — error toward
# blocking a play, not surfacing a noise card.
#
# CRITICAL — DS architect §2.3 stage-uncertainty rule:
# when ``profile.business_stage.uncertainty == "HIGH"`` (store within
# ±25% of a band boundary), ``derive_gate_calibration`` reads the
# BROADER (next-smaller) stage's cell. e.g. a store detected as
# MATURE near the GROWTH/MATURE boundary reads the GROWTH cell.
#
# L42 deferred (founder 2026-05-18): window set is exactly
# ``{L28, L56, L90}``. A 4th window for the 35–48d cadence gap is
# revisited after one real beta store.

schema_version: "1.0.0"
last_reviewed: "2026-05-17"
validation_status: heuristic_unvalidated

