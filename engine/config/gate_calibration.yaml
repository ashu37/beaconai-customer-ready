  mature: 30
  enterprise: 50

# ---------------------------------------------------------------------
# replenishment_due_per_sku_floor: per stage. The PER-SKU contributing-
# customer floor used inside ``replenishment_due_candidates`` (the
# "N customers-with->=2-repeat-purchases per SKU class" gate at
# src/audience_builders.py:418-423). Distinct from the COHORT-level
# audience_floor under ``audience_floors.replenishment_due`` (which
# gates the final assembled cohort size).
#
# Per DS architect scope card 2026-05-22 (agent_outputs/
# ecommerce-ds-architect-t2_5-floor-scope-card-2026-05-22.md): the
# legacy default of N=30 was imported as a textbook median-stability
# rule of thumb without ICP validation. <20% of representative
# small-DTC merchants (~50 SKUs, ~1,200 customers) clear N=30 per SKU
# class. ICP fit requires a smaller floor that still retains the
# "small handful of repeat-buyers to estimate a non-coin-flip median"
# spirit; the per-stage cell sizes up with the store. Audience-level
# floor remains the binding sample-size gate downstream.
# ---------------------------------------------------------------------

replenishment_due_per_sku_floor:
  startup: 8
  growth: 12
  mature: 20
  enterprise: 30

