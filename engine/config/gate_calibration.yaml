windows_pinned: [L28, L56, L90]

# ---------------------------------------------------------------------
# model_fit_thresholds (S10-T1, 2026-05-26): business-stage-keyed
# acceptance floors for the ML predictive layer (BG/NBD + Gamma-Gamma).
# Consumed by ``src/predictive/model_card.py::_load_model_fit_thresholds``
# when ``ENGINE_V2_ML_BGNBD`` is ON. Resolves to a dict keyed on the
# detected ``profile.business_stage.stage`` cell with optional
# vertical override for ``months_data_validated`` only.
#
# Lock posture (founder-accepted via DS verdict 2026-05-25):
# - ``by_business_stage`` numbers are heuristic; calibration deferred
#   to KI-NEW-P (filed at S10-T3 close).
# - ``by_vertical_months_override`` is theory-driven (cadence math —
#   supplements 45–90d replenishment ≈ 2 cycles in 4mo; beauty
#   discretionary cadence needs a full 6mo loop) — LOCKED, do NOT
#   defer to KI-NEW-P calibration.
# - ``relaxation_factors`` (0.5 multiplier, 0.10 addend) pinned across
#   all stages until KI-NEW-P calibration data lands.
#
# The four-state ``ModelFitStatus`` vocabulary (VALIDATED / PROVISIONAL
# / INSUFFICIENT_DATA / REFUSED) is documented in
# ``src/predictive/model_card.py``.
# ---------------------------------------------------------------------

# T1.4 (DS-locked 2026-05-26): PRIMARY GATE is
# ``holdout_rank_spearman_validated`` (Spearman rank correlation between
# predicted expected purchases and observed holdout-window counts).
# The legacy ``holdout_mape_validated`` is retained for operator-diagnostic
# continuity but no longer gates — see ``src/predictive/bgnbd.py``
# module docstring for the deprecation rationale (per-customer MAPE
# denominator clamps to 1.0 on single-purchase customers, so the mean
# collapses to "mean predicted 30d repeat rate" and does not measure
# error). Holdout split is TIME-BASED, not 20% customer-hash.
#
# Spearman thresholds (KI-NEW-P-v2 territory — speculative until S14
# outcome-importer calibration): VALIDATED at ρ ≥ 0.20 (per stage);
# PROVISIONAL at 0.10 ≤ ρ < 0.20; REFUSED below 0.10 or when ρ is
# undefined (zero variance in observed counts).
model_fit_thresholds:
  bgnbd:
    by_business_stage:
      startup:    {months_data_validated: 4, repeat_customers_validated: 150,  orders_validated: 450,  holdout_mape_validated: 0.30, holdout_rank_spearman_validated: 0.20}
      growth:     {months_data_validated: 6, repeat_customers_validated: 300,  orders_validated: 900,  holdout_mape_validated: 0.27, holdout_rank_spearman_validated: 0.20}
      mature:     {months_data_validated: 6, repeat_customers_validated: 500,  orders_validated: 1500, holdout_mape_validated: 0.25, holdout_rank_spearman_validated: 0.20}
      enterprise: {months_data_validated: 6, repeat_customers_validated: 1000, orders_validated: 3000, holdout_mape_validated: 0.22, holdout_rank_spearman_validated: 0.20}
    by_vertical_months_override:
      supplements: 4   # replenishment cadence ≈45–90d; 2 cycles ≈4mo
      beauty: 6        # discretionary cadence; full loop
    relaxation_factors:
      provisional_n_multiplier: 0.5
      provisional_mape_addend: 0.10                 # deprecated; not consumed by Spearman-gated classifier
      provisional_rank_spearman_floor: 0.10         # PROVISIONAL band lower bound; below → REFUSED
  # S10-T2 (DS-locked 2026-05-26): Gamma-Gamma classifier thresholds.
  # Primary gate is ``holdout_rank_spearman_validated`` (Spearman rank
  # correlation between predicted per-customer monetary value and
  # observed holdout-window mean spend). Secondary band is
  # ``agg_ratio`` (sum_predicted / sum_observed_holdout). The Pearson-r
  # on (frequency, monetary) is the Gamma-Gamma INDEPENDENCE ASSUMPTION
  # test — surfaced as ``fit_warnings=["gg_independence_violated"]`` if
  # |r| > pearson_r_violation_threshold but does NOT gate.
  #
  # Lock posture: speculative-until-S14 (KI-NEW-Q-territory, parallel to
  # KI-NEW-P-v2 for BG/NBD Spearman thresholds). The same value across
  # stages is acceptable initially (G-G is more universal than BG/NBD
  # heuristically); kept stage-keyed for forward-compat.
  #
  # Legacy keys ``independence_pearson_r_validated`` / ``_provisional``
  # are RETAINED for back-compat read by ``_load_model_fit_thresholds``
  # but are NOT consumed by the T2 classifier — they reflect the
  # pre-chained-refusal-pivot independence-gating world that the
  # advisory-warning model replaces.
  gamma_gamma:
    by_business_stage:
      startup:    {repeat_customers_validated: 50, holdout_rank_spearman_validated: 0.20, agg_ratio_min: 0.5, agg_ratio_max: 1.5}
      growth:     {repeat_customers_validated: 50, holdout_rank_spearman_validated: 0.20, agg_ratio_min: 0.5, agg_ratio_max: 1.5}
      mature:     {repeat_customers_validated: 50, holdout_rank_spearman_validated: 0.20, agg_ratio_min: 0.5, agg_ratio_max: 1.5}
      enterprise: {repeat_customers_validated: 50, holdout_rank_spearman_validated: 0.20, agg_ratio_min: 0.5, agg_ratio_max: 1.5}
    relaxation_factors:
      provisional_rank_spearman_floor: 0.10
      provisional_agg_ratio_min: 0.4
      provisional_agg_ratio_max: 1.6
    independence_check:
      pearson_r_violation_threshold: 0.10
    # Legacy advisory cutoffs (back-compat read; not consumed by T2 classifier).
    independence_pearson_r_validated: 0.3
    independence_pearson_r_provisional: 0.5
  # S11-T1 (DS-locked 2026-05-26): Cox PH survival classifier thresholds.
  # PRIMARY gate: ``holdout_c_index_validated`` (Harrell's C-index between
  # predicted risk and observed (time, event) tuples on a time-based
  # holdout). SECONDARY gate: ``holdout_brier_score_90d_validated_max``
  # (time-dependent integrated Brier score at 90d horizon — calibration
  # check). VALIDATED requires BOTH gates to clear; PROVISIONAL admits
  # rank-only (c_index in relaxed band) OR calibration-only (brier in
  # relaxed band). REFUSED on either hard-fail or fit exception.
  #
  # Speculative-until-S14 (KI-NEW-P extension; per DS verdict 2026-05-26).
  # C-index floors: 0.62 startup/growth, 0.63 mature/enterprise —
  # calibrated against Steyerberg's "weak/fair/good" bands with DTC
  # per-customer RFM-only covariates (richer covariates are a future
  # iteration). Brier@90d ≤ 0.25 across stages.
  #
  # Chained-refusal contract (S11-T1): when same engine_run's BG/NBD
  # ModelCard is REFUSED or INSUFFICIENT_DATA, survival short-circuits to
  # REFUSED with ``chained_bgnbd_refusal`` warning — Cox PH hazard
  # transforms the same gap-time signal BG/NBD evaluates.
  survival:
    by_business_stage:
      startup:    {months_data_validated: 3, repeat_customers_validated: 200,  censored_events_validated: 30,  holdout_c_index_validated: 0.62, holdout_brier_score_90d_validated_max: 0.25}
      growth:     {months_data_validated: 4, repeat_customers_validated: 300,  censored_events_validated: 50,  holdout_c_index_validated: 0.62, holdout_brier_score_90d_validated_max: 0.25}
      mature:     {months_data_validated: 6, repeat_customers_validated: 500,  censored_events_validated: 100, holdout_c_index_validated: 0.63, holdout_brier_score_90d_validated_max: 0.25}
      enterprise: {months_data_validated: 6, repeat_customers_validated: 1000, censored_events_validated: 200, holdout_c_index_validated: 0.63, holdout_brier_score_90d_validated_max: 0.25}
    relaxation_factors:
      provisional_n_multiplier: 0.5
      provisional_c_index_floor: 0.55                # PROVISIONAL band lower bound for c_index; below → REFUSED
      provisional_brier_score_90d_max: 0.35          # PROVISIONAL band upper bound for brier; above → REFUSED
  # S11-T2 (DS-locked 2026-05-26): Collaborative Filtering (implicit ALS)
  # classifier thresholds. PRIMARY gate: ``top_k_recall_validated`` (top-K
  # recall @ K=10 on a time-based holdout — fraction of held-out
  # customer×item interactions recovered in each customer's top-10 ALS
  # recommendation list). SECONDARY diagnostic: ``coverage_at_10`` (fraction
  # of catalog items appearing in any user's top-10 list); operator-visible
  # ONLY — does NOT gate.
  #
  # Speculative-until-S14 (KI-NEW-P extension; per DS verdict 2026-05-26).
  # Recall@10 floors calibrated against realistic ALS implicit-feedback
  # densities for Beauty/Supplements catalogs (200-2000 items, 5-15 avg
  # orders per repeat customer): VALIDATED bands {startup 0.05, growth
  # 0.06, mature 0.08, enterprise 0.10}; PROVISIONAL floor 0.03; REFUSED
  # below 0.03 or on convergence failure.
  #
  # CF is INDEPENDENT of BG/NBD (per DS S11 plan review §A.6). The
  # customer×item interaction matrix's structural signal does not depend
  # on the gap-time signal BG/NBD evaluates; CF fits independently when
  # BG/NBD is OFF or REFUSED. DO NOT chain CF on BG/NBD.
  cf:
    by_business_stage:
      startup:    {min_customers: 50,  min_items: 50,  min_interactions_per_user: 2, top_k_recall_validated: 0.05}
      growth:     {min_customers: 100, min_items: 75,  min_interactions_per_user: 2, top_k_recall_validated: 0.06}
      mature:     {min_customers: 200, min_items: 100, min_interactions_per_user: 2, top_k_recall_validated: 0.08}
      enterprise: {min_customers: 500, min_items: 200, min_interactions_per_user: 2, top_k_recall_validated: 0.10}
    relaxation_factors:
      provisional_n_multiplier: 0.5
      provisional_top_k_recall_floor: 0.03
    coverage_at_10_warning_threshold: 0.20
    top_k: 10
    top_n_lookalikes_per_customer: 20
    als_factors: 32
    als_regularization: 0.01
    als_iterations: 15
  # S12-T1 (DS-locked 2026-05-28): RFM (Recency × Frequency × Monetary)
  # segmentation substrate. PRIMARY gate: ``segment_monotonicity_spearman``
  # — Spearman rank correlation between the named-segment LTV-rank-order
  # and observed mean monetary value per segment. SECONDARY REFUSED guard:
  # ``quintile_coverage_min`` — smallest quintile occupancy ratio across
  # the R/F/M dimensions; below the floor signals degenerate quintile
  # collapse (e.g. ties dominate, ``pd.qcut`` collapses bins).
  #
  # Speculative-until-S14 (KI-NEW-P extension; per DS verdict 2026-05-28).
  # Spearman floors revised UP from IM's 0.50/0.55/0.60 draft to
  # 0.60/0.65/0.70/0.70 (VALIDATED) per DS §F: at the floor of the S13
  # ranking chain, weak monotonicity yields a misleading degradation
  # surface. PROVISIONAL floor 0.40; below → REFUSED.
  #
  # RFM is INDEPENDENT of BG/NBD (no chained refusal) — mirrors CF
  # (S11-T2) architectural posture, not survival. fit_rfm accepts no
  # bgnbd_model_card argument. Per DS verdict §I, on a healthy DTC
  # merchant (e.g. Beauty with 3,844 repeat customers) the substrate
  # SHOULD legitimately VALIDATE; this is the first sprint where
  # synthetics may legitimately produce VALIDATED outcomes per Pivot 5
  # §I — failure to VALIDATE here would signal a band-mapping bug.
  rfm:
    by_business_stage:
      startup:    {n_customers_validated: 50,   segment_monotonicity_spearman_validated: 0.60, quintile_coverage_min_validated: 0.10}
      growth:     {n_customers_validated: 200,  segment_monotonicity_spearman_validated: 0.65, quintile_coverage_min_validated: 0.10}
      mature:     {n_customers_validated: 500,  segment_monotonicity_spearman_validated: 0.70, quintile_coverage_min_validated: 0.10}
      enterprise: {n_customers_validated: 1000, segment_monotonicity_spearman_validated: 0.70, quintile_coverage_min_validated: 0.10}
    relaxation_factors:
      provisional_n_multiplier: 0.5
      provisional_segment_monotonicity_spearman_floor: 0.40
      provisional_quintile_coverage_min_floor: 0.05
    absolute_customers_floor: 50
    refused_quintile_coverage_min: 0.05
  # S12-T2 (DS-locked 2026-05-28): Retention curves substrate (cohort-
  # aggregate diagnostic; NOT a per-customer ranker). Cohort definition:
  # first-purchase month. PRIMARY gate: bootstrap CI width at month 3
  # (≤ stage-keyed VALIDATED floor; AND cohort_count ≥ stage floor; AND
  # no cumulative-retention monotonicity violation). REFUSED gate:
  # cumulative-retention monotonicity violation (DS-mandated: was
  # tertiary diagnostic in v1; promoted because cumulative retention
  # CANNOT mathematically rise on the "still active" definition — a
  # violation = data-shape bug).
  #
  # Speculative-until-S14 (KI-NEW-P closure). Per DS verdict 2026-05-28.
  # CI-width floors revised DOWN from IM's 0.30/0.25/0.20/0.20 to
  # 0.25/0.20/0.15/0.15 (VALIDATED) per DS §G: a 30pp CI band on a
  # quantity typically 20-50% is not informative for ranking purposes.
  # PROVISIONAL ceiling 0.35; > 0.35 → REFUSED.
  #
  # Retention is INDEPENDENT — no chained refusal (parallels CF + RFM
  # independence posture). Lives in NEW top-level
  # ``EngineRun.cohort_diagnostics`` slot, NOT ``predictive_models``
  # (per DS §C: ranker Dict stays ranker-pure; cohort-aggregate
  # diagnostics get their own slot).
  retention:
    by_business_stage:
      startup:    {cohort_count_validated: 6,  bootstrap_ci_width_at_month_3_max_validated: 0.25}
      growth:     {cohort_count_validated: 12, bootstrap_ci_width_at_month_3_max_validated: 0.20}
      mature:     {cohort_count_validated: 12, bootstrap_ci_width_at_month_3_max_validated: 0.15}
      enterprise: {cohort_count_validated: 12, bootstrap_ci_width_at_month_3_max_validated: 0.15}
    relaxation_factors:
      provisional_n_multiplier: 0.5
      provisional_bootstrap_ci_width_at_month_3_max: 0.35
    absolute_cohort_count_floor: 3
    bootstrap_iterations: 1000
    months_horizon: 12
    min_cohort_size_floor: 20
    cumulative_retention_monotonicity_violation_refused: true
